<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>MovieFlix</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <body>
    <nav class="navbar fixed-top">
      <div class="container">
        <h2 class="logo">MovieFlix</h2>

        <button id="loadMovies" class="btn btn-danger">Cargar películas</button>
      </div>
    </nav>

    <section class="container mt-4 movies">
      <div id="movies" class="movies-grid"></div>
    </section>

    <div class="modal fade" id="modalPelicula" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitulo"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <img id="modalImagen" class="img-fluid mb-3" />

            <p id="modalDescripcion"></p>

            <p id="modalFecha"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
